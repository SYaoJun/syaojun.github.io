# NexT 主题配置覆盖
# 使用 Gemini 主题（类似参考站点）
scheme: Gemini

# 侧边栏配置
sidebar:
  position: left
  display: always
  padding: 18
  offset: 12

# 头像
avatar:
  url: /head.jpg
  rounded: true
  rotated: false

# 站点统计（文章数/分类数/标签数）
site_state: true

# 社交链接
social:
  GitHub: https://github.com/SYaoJun || fab fa-github
  Twitter: https://x.com/Jacky2023z || fab fa-twitter


social_icons:
  enable: true
  icons_only: false
  transition: false

# Gitalk 评论系统
# 基于 GitHub Issue 的评论系统
# 配置说明：
# 1. github_id: 您的 GitHub 用户名
# 2. repo: 存储评论的 GitHub 仓库名称
# 3. client_id: GitHub OAuth Application 的 Client ID
# 4. client_secret: GitHub OAuth Application 的 Client Secret
# 5. admin_user: 管理员用户名（通常与 github_id 相同）
# 6. language: 评论系统语言，留空则自动检测
# 7. distraction_free_mode: 是否启用无干扰模式

# 评论系统设置
comments:
  style: tabs
  active: gitalk
  storage: true
  lazyload: false
  nav:
    gitalk:
      order: -1

gitalk:
  enable: true
  github_id: syaojun
  repo: syaojun.github.io
  client_id: "Ov23liuPFA5t0Euqqpfo"
  client_secret: "8b07fc2c1ddc89f3419504198d2b1afb99a315fd"
  admin_user: syaojun
  language: zh-CN
  distraction_free_mode: true

# 友情链接
links_settings:
  icon: fa fa-link
  title: 友情链接
  layout: block

links:
  # 示例: 名称: 链接地址
  # friend: https://example.com

# 开启菜单
menu:
  home: / || fa fa-home
  archives: /archives || fa fa-archive
  categories: /categories || fa fa-th
  about: /about || fa fa-user

# 开启 motion 动画
motion:
  enable: true
  async: false
  transition:
    post_block: fadeIn
    post_header: slideDownIn
    post_body: slideDownIn
    coll_header: slideLeftIn
    sidebar: slideUpIn
